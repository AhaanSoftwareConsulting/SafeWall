<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curved Wall Slider - Equal Gap</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 3000px;
        }

        .slider {
            position: relative;
            width: 100%;
            height: 75vh;
            transform-style: preserve-3d;
            cursor: grab;
        }

        .slider:active {
            cursor: grabbing;
        }

        .slide {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 220px;
            height: 320px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, .35);
            transition: transform .6s cubic-bezier(.22, .61, .36, 1);
        }

        @media(max-width:768px) {
            .slide {
                width: 160px;
                height: 300px;
            }
        }
    </style>
</head>

<body>

    <div class="hero">
        <div class="slider" id="slider">

            <!-- 10 Slides -->
            <div class="slide" style="background-image:url('./images/Rectangle\ 12\ \(1\).png')"></div>
            <div class="slide" style="background-image:url('./images/Rectangle\ 11.png')"></div>
            <div class="slide" style="background-image:url('./images/Rectangle\ 14.png')"></div>
            <div class="slide" style="background-image:url('./images/Frame\ 27.png')"></div>
            <div class="slide" style="background-image:url('./images/Frame\ 28.png')"></div>
            <div class="slide" style="background-image:url('./images/Frame\ 29.png')"></div>
            <div class="slide" style="background-image:url('./images/Rectangle\ 11.png')"></div>
            <div class="slide" style="background-image:url('./images/Rectangle\ 11.png')"></div>
            <div class="slide" style="background-image:url('./images/Frame\ 29.png')"></div>
            <div class="slide" style="background-image:url('./images/Rectangle\ 11.png')"></div>

        </div>
    </div>

    <script>
        const slides = document.querySelectorAll(".slide");
        const slider = document.getElementById("slider");

        let current = 4;
        let isDragging = false;
        let startX = 0;

        const slideWidth = 220;
        const gap = 24;  // SAME gap everywhere

        function updateSlides() {

            slides.forEach((slide, i) => {

                const offset = i - current;

                let rotateY = 0;
                let translateZ = 0;

                if (Math.abs(offset) <= 1) {
                    // 3 center slides flat
                    rotateY = 0;
                    translateZ = 0;
                } else {
                    // Curved wall effect
                    const curveStrength = 18;  // more rotation
                    rotateY = -Math.sign(offset) * (Math.abs(offset) * curveStrength);
                    translateZ = -Math.abs(offset) * 60; // smooth depth
                }

                const translateX = offset * (slideWidth + gap);

                slide.style.transform = `
            translate(-50%, -50%)
            translateX(${translateX}px)
            translateZ(${translateZ}px)
            rotateY(${rotateY}deg)
        `;

                slide.style.zIndex = 100 - Math.abs(offset);
                slide.style.opacity = Math.abs(offset) > 6 ? 0 : 1;
            });
        }

        updateSlides();

        /* Drag Desktop */
        slider.addEventListener("mousedown", e => {
            isDragging = true;
            startX = e.clientX;
        });

        window.addEventListener("mouseup", () => {
            isDragging = false;
        });

        window.addEventListener("mousemove", e => {
            if (!isDragging) return;

            let diff = e.clientX - startX;

            if (diff > 120) {
                current = Math.max(0, current - 1);
                startX = e.clientX;
                updateSlides();
            }

            if (diff < -120) {
                current = Math.min(slides.length - 1, current + 1);
                startX = e.clientX;
                updateSlides();
            }
        });

        /* Touch Support */
        slider.addEventListener("touchstart", e => {
            isDragging = true;
            startX = e.touches[0].clientX;
        });

        window.addEventListener("touchend", () => {
            isDragging = false;
        });

        window.addEventListener("touchmove", e => {
            if (!isDragging) return;

            let diff = e.touches[0].clientX - startX;

            if (diff > 120) {
                current = Math.max(0, current - 1);
                startX = e.touches[0].clientX;
                updateSlides();
            }

            if (diff < -120) {
                current = Math.min(slides.length - 1, current + 1);
                startX = e.touches[0].clientX;
                updateSlides();
            }
        });
    </script>

</body>

</html>
